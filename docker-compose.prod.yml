# Production stack on a Hetzner CX22 (or similar) Ubuntu 24.04 box.
# Caddy fronts everything on 80/443 with auto-TLS via Let's Encrypt.
# Only Caddy is exposed to the public internet — db & api speak on the internal docker network.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # NO `ports:` — db is only reachable inside the docker network.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      API_PORT: 3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # In prod everything's same-origin behind Caddy, so APP_URL is the public URL of the API too.
      API_PUBLIC_URL: ${API_PUBLIC_URL:-${APP_URL}}
    expose:
      - '3000' # only inside the docker network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    # Builds the static bundle and copies it into the shared web-static volume.
    # The container then idles so the volume stays mounted and survives restarts.
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    volumes:
      - web-static:/srv/web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web-static:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  postgres-data:
  web-static:
  caddy-data:
  caddy-config:
