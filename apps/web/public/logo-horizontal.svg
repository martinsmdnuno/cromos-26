<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <rect x="0" y="0" width="600" height="240" fill="#F5E6D3"/>

  <!-- Decorative geometric shapes inspired by album cover -->
  <g opacity="0.95">
    <path d="M 0 0 L 80 0 Q 80 80 0 80 Z" fill="#E63027"/>
    <path d="M 80 0 L 160 0 L 160 80 Q 80 80 80 0 Z" fill="#F2812A"/>
    <rect x="160" y="0" width="80" height="40" fill="#F4C430"/>
    <path d="M 0 80 Q 0 160 80 160 L 80 80 Z" fill="#6FBE44"/>
    <rect x="0" y="160" width="80" height="80" fill="#2FB8AB"/>
    <path d="M 520 200 Q 600 200 600 240 L 520 240 Z" fill="#7B4B9E"/>
    <path d="M 560 0 L 600 0 L 600 80 Q 560 80 560 40 Z" fill="#2E6FB8"/>
    <rect x="440" y="0" width="80" height="40" fill="#1B3A6B"/>
  </g>

  <!-- Center white card -->
  <rect x="80" y="50" width="440" height="140" rx="14" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>

  <!-- "26" big numerals -->
  <g transform="translate(100, 70)">
    <text x="0" y="98" font-family="'Anton', 'Bebas Neue', Impact, sans-serif" font-size="120" fill="#E63027" letter-spacing="-4">2</text>
    <text x="68" y="98" font-family="'Anton', 'Bebas Neue', Impact, sans-serif" font-size="120" fill="#2E6FB8" letter-spacing="-4">6</text>
  </g>

  <!-- Wordmark to the right -->
  <g transform="translate(265, 95)">
    <text x="0" y="0" font-family="'Anton', 'Bebas Neue', Impact, sans-serif" font-size="34" fill="#1A1A1A" letter-spacing="2">CROMOS</text>
    <line x1="0" y1="10" x2="200" y2="10" stroke="#E63027" stroke-width="3"/>
    <text x="0" y="38" font-family="'JetBrains Mono', 'Space Mono', monospace" font-size="11" fill="#1A1A1A" letter-spacing="3" font-weight="700">COLLECTION MANAGER</text>
    <text x="0" y="60" font-family="'JetBrains Mono', 'Space Mono', monospace" font-size="9" fill="#7B4B9E" letter-spacing="2" font-weight="700">980 STICKERS · WORLD CUP 2026</text>
  </g>
</svg>
