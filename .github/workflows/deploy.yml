name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @cromos/api prisma:generate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # If you set a non-default port:
          # port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.SSH_USER }}/cromos-26
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T api npx prisma migrate deploy
            docker image prune -f
